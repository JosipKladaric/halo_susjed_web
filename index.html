<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Halo, susjed! | Susjedstvo na dlanu</title>
    <meta name="description" content="Povežite se sa susjedima. Objavite što trebate i primite ponude od lokalnih ponuđača.">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <link rel="icon" type="image/png" href="assets/icons/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="main-header">
            <div class="logo">
                <span class="logo-icon">👋</span>
                <h1>Halo, <span>susjed!</span></h1>
            </div>
            <button id="profile-btn" class="icon-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </button>
        </header>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Feed Section -->
            <section id="feed-screen" class="screen active">
                <div class="search-bar">
                    <input type="text" placeholder="Pretraži potrebe u susjedstvu..." id="search-input">
                </div>
                

                <div id="needs-list" class="needs-container">
                    <!-- Cards will be injected here -->
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </section>

            <!-- Add Post Section -->
            <section id="add-screen" class="screen">
                <div class="screen-header">
                    <h2>Što ti treba?</h2>
                    <p>Opiši svoj zahtjev i susjedi će ti se javiti.</p>
                </div>
                <form id="post-form" class="modern-form">
                    <div class="form-group">
                        <label for="description">Opis</label>
                        <textarea id="description" rows="4" placeholder="Detaljnije opiši što ti treba..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="expiry">Trajanje oglasa</label>
                        <select id="expiry">
                            <option value="1">1 dan</option>
                            <option value="3" selected>3 dana</option>
                            <option value="7">7 dana</option>
                        </select>
                    </div>
                    <!-- Location is detected automatically in the background -->
                    <button type="submit" class="submit-btn">Objavi oglas</button>
                </form>
            </section>

            <!-- Profile Section -->
            <section id="profile-screen" class="screen">
                <!-- Logged Out View -->
                <div id="auth-view" class="auth-container">
                    <div class="screen-header">
                        <h2>Priključi se susjedstvu</h2>
                        <p>Unesite podatke kako biste se prijavili ili registrirali.</p>
                    </div>

                    <div class="auth-fields modern-form">
                        <div class="form-group">
                            <label for="auth-ime">Ime</label>
                            <input type="text" id="auth-ime" placeholder="Ivan" autocomplete="given-name">
                        </div>
                        <div class="form-group">
                            <label for="auth-prezime">Prezime</label>
                            <input type="text" id="auth-prezime" placeholder="Horvat" autocomplete="family-name">
                        </div>
                        <div class="form-group">
                            <label for="auth-sifra">Šifra</label>
                            <input type="password" id="auth-sifra" placeholder="••••••••" autocomplete="current-password">
                        </div>
                        <div id="auth-error" class="auth-error" style="display:none;"></div>
                        <div class="auth-btn-row">
                            <button id="btn-prijava" class="auth-action-btn secondary-auth-btn">Prijava</button>
                            <button id="btn-registracija" class="auth-action-btn primary-auth-btn">Registracija</button>
                        </div>
                    </div>
                </div>

                <!-- Logged In View -->
                <div id="user-view" class="profile-container" style="display: none;">
                    <div class="profile-header">
                        <div class="profile-avatar">👤</div>
                        <h3 id="user-display-name">Korisnik</h3>
                        <p id="user-display-handle" style="color: var(--text-muted); font-size: 0.9rem;"></p>
                        <button id="logout-btn" class="secondary-btn">Odjavi se</button>
                    </div>
                    <div class="profile-menu">
                        <button class="menu-item">Moje objave</button>
                        <button class="menu-item" data-screen="messages-screen">Moje poruke</button>
                        <button class="menu-item">Postavke</button>
                    </div>
                </div>
            </section>

            <!-- Messages Section -->
            <section id="messages-screen" class="screen">
                <div class="screen-header">
                    <h2>Poruke</h2>
                </div>
                <div id="messages-list" class="messages-container">
                    <p class="empty-state">Ovdje će biti vaši razgovori.</p>
                </div>
            </section>
        </main>

        <!-- Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" id="nav-feed" data-screen="feed-screen">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                <span>Susjedi</span>
            </button>
            <button class="nav-item fab" id="nav-add" data-screen="add-screen">
                <div class="fab-inner">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>
            </button>
            <button class="nav-item" id="nav-auth" data-screen="profile-screen">
                <svg id="nav-auth-icon-login" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                <svg id="nav-auth-icon-msg" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                <span id="nav-auth-label">Priključi se</span>
            </button>
        </nav>

        <!-- Message Modal -->
        <div id="message-modal" class="modal">
            <div class="modal-content">
                <h3>Pošalji poruku susjedu</h3>
                <p id="modal-ad-info" style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem;"></p>
                <textarea id="message-text" placeholder="Napiši svoju ponudu ili upit..." rows="4"></textarea>
                <div class="modal-actions">
                    <button id="close-modal" class="secondary-btn">Odustani</button>
                    <button id="send-msg-btn" class="submit-btn">Pošalji</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/app.js"></script>
</body>
</html>
