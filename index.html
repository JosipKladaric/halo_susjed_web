<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Halo, susjed! | Susjedstvo na dlanu</title>
    <meta name="description" content="Povežite se sa susjedima. Objavite što trebate i primite ponude od lokalnih ponuđača.">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <link rel="icon" type="image/png" href="assets/icons/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="main-header">
            <div class="logo">
                <span class="logo-icon">👋</span>
                <h1>Halo, <span>susjed!</span></h1>
            </div>
            <button id="profile-btn" class="icon-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </button>
        </header>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Feed Section -->
            <section id="feed-screen" class="screen active">
                <div class="search-bar">
                    <input type="text" placeholder="Pretraži potrebe u susjedstvu..." id="search-input">
                </div>
                
                <div class="filters">
                    <button class="filter-chip active">Sve</button>
                    <button class="filter-chip">Usluge</button>
                    <button class="filter-chip">Stvari</button>
                    <button class="filter-chip">Pomoć</button>
                </div>

                <div id="needs-list" class="needs-container">
                    <!-- Cards will be injected here -->
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </section>

            <!-- Add Post Section -->
            <section id="add-screen" class="screen">
                <div class="screen-header">
                    <h2>Što ti treba?</h2>
                    <p>Opiši svoj zahtjev i susjedi će ti se javiti.</p>
                </div>
                <form id="post-form" class="modern-form">
                    <div class="form-group">
                        <label for="category">Kategorija</label>
                        <select id="category">
                            <option value="usluge">Usluga</option>
                            <option value="stvari">Stvar / Posudba</option>
                            <option value="pomoc">Hitna pomoć</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="description">Opis</label>
                        <textarea id="description" rows="4" placeholder="Detaljnije opiši što ti treba..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="expiry">Trajanje oglasa</label>
                        <select id="expiry">
                            <option value="1">1 dan</option>
                            <option value="3" selected>3 dana</option>
                            <option value="7">7 dana</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="location">Tvoj kvart / Lokacija</label>
                        <div class="input-with-icon">
                            <input type="text" id="location" placeholder="Očitavam..." required>
                            <button type="button" class="detect-btn" onclick="detectLocation()">
                                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">Objavi oglas</button>
                </form>
            </section>

            <!-- Profile Section -->
            <section id="profile-screen" class="screen">
                <!-- Logged Out View -->
                <div id="auth-view" class="auth-container">
                    <div class="screen-header">
                        <h2>Dobrodošli natrag!</h2>
                        <p>Prijavite se kako biste mogli objavljivati i komunicirati sa susjedima.</p>
                    </div>
                    
                    <div class="auth-tabs">
                        <button class="auth-tab-btn active" data-tab="login-form">Prijava</button>
                        <button class="auth-tab-btn" data-tab="register-form">Registracija</button>
                    </div>

                    <form id="login-form" class="modern-form auth-form active">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="login-email" placeholder="vas@email.com" required>
                        </div>
                        <div class="form-group">
                            <label>Lozinka</label>
                            <input type="password" id="login-password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="submit-btn">Prijavi se</button>
                    </form>

                    <form id="register-form" class="modern-form auth-form">
                        <div class="form-group">
                            <label>Ime i prezime</label>
                            <input type="text" id="reg-name" placeholder="Ivan Horvat" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="reg-email" placeholder="vas@email.com" required>
                        </div>
                        <div class="form-group">
                            <label>Lozinka</label>
                            <input type="password" id="reg-password" placeholder="Min. 6 znakova" required>
                        </div>
                        <button type="submit" class="submit-btn">Kreiraj račun</button>
                    </form>
                </div>

                <!-- Logged In View -->
                <div id="user-view" class="profile-container" style="display: none;">
                    <div class="profile-header">
                        <div class="profile-avatar">👤</div>
                        <h3 id="user-display-name">Korisnik</h3>
                        <p id="user-display-email" style="color: var(--text-muted); font-size: 0.9rem;"></p>
                        <button id="logout-btn" class="secondary-btn">Odjavi se</button>
                    </div>
                    <div class="profile-menu">
                        <button class="menu-item">Moje objave</button>
                        <button class="menu-item" data-screen="messages-screen">Moje poruke</button>
                        <button class="menu-item">Postavke</button>
                    </div>
                </div>
            </section>

            <!-- Messages Section -->
            <section id="messages-screen" class="screen">
                <div class="screen-header">
                    <h2>Poruke</h2>
                </div>
                <div id="messages-list" class="messages-container">
                    <p class="empty-state">Ovdje će biti vaši razgovori.</p>
                </div>
            </section>
        </main>

        <!-- Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-screen="feed-screen">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Naslovna</span>
            </button>
            <button class="nav-item fab" data-screen="add-screen">
                <div class="fab-inner">
                    <span>Objavi oglas</span>
                </div>
            </button>
            <button class="nav-item" data-screen="profile-screen">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>Profil</span>
            </button>
        <!-- Message Modal -->
        <div id="message-modal" class="modal">
            <div class="modal-content">
                <h3>Pošalji poruku susjedu</h3>
                <p id="modal-ad-info" style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem;"></p>
                <textarea id="message-text" placeholder="Napiši svoju ponudu ili upit..." rows="4"></textarea>
                <div class="modal-actions">
                    <button id="close-modal" class="secondary-btn">Odustani</button>
                    <button id="send-msg-btn" class="submit-btn">Pošalji</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/app.js"></script>
</body>
</html>
